apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-chatgpt-backend
  labels:
    app: my-chatgpt-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-chatgpt-backend
  template:
    metadata:
      labels:
        app: my-chatgpt-backend
    spec:
      containers:
      - name: backend
        image: docker.io/yazidbouha/my-chatgpt-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: PORT
          value: "3000"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: my-chatgpt-secret
              key: MONGODB_URI
        - name: HUGGINGFACE_TOKEN
          valueFrom:
            secretKeyRef:
              name: my-chatgpt-secret
              key: HUGGINGFACE_TOKEN
        - name: HUGGINGFACE_API_URL
          valueFrom:
            secretKeyRef:
              name: my-chatgpt-secret
              key: HUGGINGFACE_API_URL
              optional: true
        - name: HUGGINGFACE_MODEL
          valueFrom:
            secretKeyRef:
              name: my-chatgpt-secret
              key: HUGGINGFACE_MODEL
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

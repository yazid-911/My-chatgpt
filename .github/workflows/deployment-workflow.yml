name: Build, Push, and Deploy to GKE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  BACKEND_IMAGE_NAME: my-chatgpt-backend
  FRONTEND_IMAGE_NAME: my-chatgpt-frontend
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
  K8S_NAMESPACE: default

jobs:
  build-and-push:
    name: Build and Push Backend and Frontend
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Cache 1 : dépendances Node.js — backend ──────────────────────────
      # Clé = hash de package-lock.json.
      # Si le fichier n'a pas changé → node_modules restauré en ~5 s.
      - name: Cache node_modules (backend)
        uses: actions/cache@v4
        with:
          path: backend-dev/node_modules
          key: backend-node-${{ runner.os }}-${{ hashFiles('backend-dev/package-lock.json') }}
          restore-keys: |
            backend-node-${{ runner.os }}-

      # ── Cache 2 : dépendances Node.js — frontend ─────────────────────────
      - name: Cache node_modules (frontend)
        uses: actions/cache@v4
        with:
          path: my-chatgpt-frontend/node_modules
          key: frontend-node-${{ runner.os }}-${{ hashFiles('my-chatgpt-frontend/package-lock.json') }}
          restore-keys: |
            frontend-node-${{ runner.os }}-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Cache 3 : layers Docker — backend ────────────────────────────────
      # cache-from : tire les layers déjà poussés sur Docker Hub.
      # cache-to   : pousse les nouveaux layers sous le tag :buildcache.
      # Résultat : si seul le code source a changé, les layers
      # FROM / npm ci sont restaurés depuis le registry (~30 s au lieu de ~3 min).
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend-dev
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:buildcache,mode=max

      # ── Cache 4 : layers Docker — frontend ───────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./my-chatgpt-frontend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # Job deploy-to-gke : inchangé
  # ─────────────────────────────────────────────────────────────────────────
  deploy-to-gke:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-and-push

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Ensure namespace exists
        run: kubectl create namespace "${K8S_NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create or update backend secret
        env:
          MONGODB_ROOT_USERNAME: ${{ secrets.MONGODB_ROOT_USERNAME }}
          MONGODB_ROOT_PASSWORD: ${{ secrets.MONGODB_ROOT_PASSWORD }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          HUGGINGFACE_API_URL: ${{ secrets.HUGGINGFACE_API_URL }}
          HUGGINGFACE_MODEL: ${{ secrets.HUGGINGFACE_MODEL }}
        run: |
          kubectl create secret generic mongodb-auth \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=MONGODB_ROOT_USERNAME="${MONGODB_ROOT_USERNAME}" \
            --from-literal=MONGODB_ROOT_PASSWORD="${MONGODB_ROOT_PASSWORD}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic my-chatgpt-secret \
            --namespace "${K8S_NAMESPACE}" \
            --from-literal=MONGODB_HOST="mongodb-0.mongodb.${K8S_NAMESPACE}.svc.cluster.local" \
            --from-literal=MONGODB_PORT="27017" \
            --from-literal=MONGODB_DB_NAME="mychatgpt" \
            --from-literal=MONGODB_AUTH_SOURCE="admin" \
            --from-literal=HUGGINGFACE_TOKEN="${HUGGINGFACE_TOKEN}" \
            --from-literal=HUGGINGFACE_API_URL="${HUGGINGFACE_API_URL}" \
            --from-literal=HUGGINGFACE_MODEL="${HUGGINGFACE_MODEL}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl delete service mongodb -n "${K8S_NAMESPACE}" --ignore-not-found=true
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/mongodb-service.yaml
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/mongodb-statefulset.yaml
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/backend-service.yaml
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/backend-deployment.yaml
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/frontend-service.yaml
          kubectl apply -n "${K8S_NAMESPACE}" -f k8s/frontend-deployment.yaml

      - name: Update deployment images
        run: |
          kubectl set image deployment/my-chatgpt-backend \
            backend=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            -n "${K8S_NAMESPACE}"
          kubectl set image deployment/my-chatgpt-frontend \
            frontend=docker.io/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} \
            -n "${K8S_NAMESPACE}"

      - name: Wait for rollout
        run: |
          kubectl rollout status statefulset/mongodb -n "${K8S_NAMESPACE}" --timeout=10m
          kubectl rollout status deployment/my-chatgpt-backend -n "${K8S_NAMESPACE}" --timeout=5m
          kubectl rollout status deployment/my-chatgpt-frontend -n "${K8S_NAMESPACE}" --timeout=5m

      - name: Show deployed resources
        run: |
          kubectl get deployments,svc,pods -n "${K8S_NAMESPACE}"
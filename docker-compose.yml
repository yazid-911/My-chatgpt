services:
  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: my-chatgpt-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - my-chatgpt-network
    healthcheck:
      test: ["CMD", "mongosh", "localhost/test", "--eval", "db.runCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend-dev
      dockerfile: Dockerfile
    container_name: my-chatgpt-backend
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://root:root@mongodb:27017/mychatgpt?authSource=admin
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN}
      HUGGINGFACE_API_URL: ${HUGGINGFACE_API_URL}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL}
    ports:
      - "3000:3000"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - mongodb
    networks:
      - my-chatgpt-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => { if (r.statusCode!==200) process.exit(1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Frontend
  frontend:
    build:
      context: ./my-chatgpt-frontend
      dockerfile: Dockerfile
    container_name: my-chatgpt-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - my-chatgpt-network
    environment:
      - REACT_APP_API_URL=/api

volumes:
  mongodb_data:

networks:
  my-chatgpt-network:
    driver: bridge
